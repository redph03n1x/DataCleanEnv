name: dataclean-env
version: "1.0.0"
description: >
  A real-world OpenEnv environment where an AI agent learns to clean
  dirty datasets toward a stated purpose. Three tasks from easy to hard
  covering sales data, multi-table warehouse merges, and legacy lake migrations.
author: YOUR_HF_USERNAME
tags:
  - openenv
  - data-cleaning
  - data-science
  - tabular
  - real-world
  - rl-environment

environment:
  entry_point: server.app:app
  port: 7860
  reset_endpoint: /reset
  step_endpoint: /step
  state_endpoint: /state
  health_endpoint: /health

tasks:
  - id: monday_morning
    name: "The Analyst's Monday Morning"
    difficulty: easy
    max_steps: 15
    success_threshold: 0.60

  - id: warehouse_merge
    name: "The Data Warehouse Merge"
    difficulty: medium
    max_steps: 30
    success_threshold: 0.50

  - id: data_lake_crisis
    name: "The Data Lake Crisis"
    difficulty: hard
    max_steps: 60
    success_threshold: 0.45

observation_space:
  type: structured_json
  schema: env/models.py::Observation

action_space:
  type: discrete_parameterised
  n_action_types: 18
  schema: env/models.py::Action

reward:
  type: dense_plus_terminal
  range: [-1.0, 1.0]

reproducibility:
  seed_based: true
  train_seeds: [1, 8000]
  validation_seeds: [8001, 9000]
  test_seeds: [9001, 10000]